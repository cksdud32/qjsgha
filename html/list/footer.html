<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="../css/Dark.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* color: #000; <- 이 부분을 지우거나 아래처럼 변수로 바꾸세요 */
    color: var(--text-main); 
}

li { list-style: none; }

footer {
    width: 100%;
    padding: 20px 0;   
    text-align: center;
    font-size: 14.4px;
    /* 고정값 대신 변수 사용 */
    color: var(--text-muted);
    background-color: var(--background); /* 혹은 var(--card-bg) */
    transition: all 0.3s ease; /* 부드러운 전환을 위해 추가 */
}

footer p {
    line-height: 1.6;
}

footer a {
    text-decoration: none;
    color: var(--primary); /* 인스타그램 링크 등을 강조색으로 */
}

footer a:hover {
    text-decoration: underline;
}

/* 팝업 내부도 다크모드 대응 */
.img-popup-inner {
    background: var(--card-bg);
    color: var(--text-main);
}

    .img-popup {
  display: none;
}

.img-popup:target {
  display: flex;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  justify-content: center;
  align-items: center;
  z-index: 99911;
}

.img-popup img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #444;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

.close-btn:hover {
    background: #666;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 24px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
  </style>
</head>
<body>
  <footer>
    <p>
      &copy; 2026 cksdud3. All rights reserved.<br>
      본 사이트는 체리들을 위한 공간으로,<br>
      공식 운영 사이트가 아닌 팬 제작 비공식·비영리 사이트입니다.<br>
      친목 목적이 아닌, 체리분들이 현준님 정보를 편하게 확인할 수 있도록 제작되었습니다.<br>
      문의: Instagram →
      <a href="https://www.instagram.com/cksdud3/" target="_blank" rel="noopener noreferrer">@cksdud3</a> <br>
      <a href="#img12" style="color: blue;"> 사진 및 자료 사용 안내 </a>
    </p>
     <div id="img12" class="img-popup">
        <a href="#none" class="close-btn">✕</a>
        <img src="image/as.PNG" alt="사용 허가 이미지">
    </div>
  </footer>

  <script src="../loadHeaderFooter.js"></script>
</body>
</html>
