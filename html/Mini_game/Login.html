<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link rel="stylesheet" href="ML/ML.css">
</head>
<body>
    <div class="admin-login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>관리자 로그인</h1>
                <p>사이트 관리자를 위한 안전한 로그인 페이지입니다.</p>
            </div>
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="adminId">아이디</label>
                    <input id="adminId" type="text" placeholder="관리자 아이디를 입력하세요" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="adminPassword">비밀번호</label>
                    <input id="adminPassword" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
                </div>
                <button type="submit" class="login-button">로그인</button>
                <div id="loginStatus" class="login-status"></div>
                <div class="login-footer">
                    <a href="ina.html" class="back-button">돌아가기</a>
                </div>
            </form>
        </div>
    </div>
    <script src="ML/admin.js"></script>
</body>
</html>
