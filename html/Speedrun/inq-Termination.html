<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓팅 연습 사이트</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Malgun Gothic", AppleSDGothicNeo, sans-serif;
            background: #eef0ff;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .result-card {
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
            padding: 56px 48px;
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        .result-icon { font-size: 72px; margin-bottom: 20px; line-height: 1; }
        .result-title { font-size: 26px; font-weight: bold; color: #111827; margin-bottom: 10px; letter-spacing: -0.02em; }
        .result-name { font-size: 18px; color: #e04060; font-weight: bold; margin-bottom: 36px; }
        .result-divider { border: none; border-top: 1px solid #e8e8e8; margin-bottom: 28px; }
        .result-time-label { font-size: 13px; color: #888; margin-bottom: 10px; letter-spacing: 0.04em; }

        .result-time {
            font-size: 52px;
            font-weight: bold;
            font-family: monospace;
            color: #111827;
            letter-spacing: 0.02em;
            margin-bottom: 20px;
        }

        /* 이전 기록 비교 박스 */
        .compare-box {
            display: none;
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
            text-align: left;
            line-height: 2;
        }

        .compare-box .compare-label { font-weight: bold; color: #333; }
        .compare-box .compare-time { font-family: monospace; font-weight: bold; }
        .compare-box .compare-time.better { color: #16a34a; }
        .compare-box .compare-time.worse  { color: #dc2626; }

        .result-sub { font-size: 13px; color: #aaa; margin-bottom: 32px; line-height: 1.7; }

        .btn-home {
            display: inline-block;
            padding: 12px 32px;
            background: #111;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.02em;
        }
        .btn-home:hover { background: #333; }

        .saving-msg { font-size: 12px; color: #bbb; margin-top: 14px; }

        .saving-error {
            display: none;
            margin-top: 16px;
            padding: 14px 18px;
            background: #fff5f5;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            font-size: 13px;
            color: #b91c1c;
            line-height: 1.6;
            text-align: left;
        }

        .ranking-card {
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
            padding: 40px 48px;
            max-width: 520px;
            width: 100%;
            margin-top: 24px;
        }

        .ranking-title {
            font-size: 20px;
            font-weight: bold;
            color: #111827;
            margin-bottom: 20px;
            text-align: center;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .ranking-table th {
            text-align: center;
            padding: 8px 6px;
            border-bottom: 2px solid #111827;
            font-size: 12px;
            color: #6b7280;
            letter-spacing: 0.04em;
        }

        .ranking-table td {
            text-align: center;
            padding: 10px 6px;
            border-bottom: 1px solid #f0f0f0;
            font-family: monospace;
        }

        .ranking-table td.td-name {
            font-family: inherit;
            text-align: left;
            padding-left: 12px;
        }

        .ranking-table td.td-rank {
            font-weight: bold;
            font-family: inherit;
            width: 40px;
        }

        .ranking-table tr.rank-1 td { color: #b45309; }
        .ranking-table tr.rank-2 td { color: #6b7280; }
        .ranking-table tr.rank-3 td { color: #b45309; opacity: 0.7; }

        .ranking-table tr.my-record {
            background: #f0f9ff;
        }

        .ranking-table tr.my-record td {
            font-weight: bold;
            color: #0369a1;
        }

        .ranking-empty {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            padding: 24px 0;
        }

        .ranking-loading {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            padding: 24px 0;
        }

        @media (max-width: 560px) {
            .ranking-card { padding: 28px 20px; }
        }

        .step-bar {
            display: flex;
            width: 100%;
            max-width: 520px;
            border: 1px solid #ccc;
            margin-bottom: 28px;
            background: #f2f2f2;
        }

        .step-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 10px;
            color: #aaa;
            font-size: 13px;
        }

        .step-item + .step-item { border-left: 1px solid #ccc; }

        .step-item.active {
            background: #fff;
            outline: 2px solid #666;
            outline-offset: -2px;
            color: #333;
            z-index: 1;
        }

        .step-icon { font-size: 24px; margin-bottom: 6px; line-height: 1; }
    </style>
</head>
<body>

    <div class="step-bar">
        <div class="step-item"><div class="step-icon">🛒</div>장바구니</div>
        <div class="step-item"><div class="step-icon">✏️</div>주문서 작성/결제</div>
        <div class="step-item active"><div class="step-icon">📦</div>주문완료</div>
    </div>

    <div class="result-card">
        <div class="result-icon" id="resultIcon">🎉</div>
        <h1 class="result-title" id="resultTitle">티켓팅 완료!</h1>
        <p class="result-name" id="resultName">닉네임님의 기록</p>
        <hr class="result-divider">
        <p class="result-time-label" id="resultTimeLabel">기록</p>
        <div class="result-time" id="resultTime">--:--.---</div>

        <!-- 이전/현재 기록 비교 -->
        <div class="compare-box" id="compareBox">
            <div><span class="compare-label" id="compareLabel1"></span> <span class="compare-time" id="compareTime1"></span></div>
            <div><span class="compare-label" id="compareLabel2"></span> <span class="compare-time" id="compareTime2"></span></div>
        </div>

        <p class="result-sub" id="resultSub">주문이 정상적으로 처리되었습니다.<br>빠른 티켓팅 실력이네요!</p>
        <button class="btn-home" onclick="window.location.href='inq.html'">목록으로 돌아가기</button>
        <p class="saving-msg" id="savingMsg">기록 저장 중...</p>
        <div class="saving-error" id="savingError">
            ⚠️ 기록을 데이터베이스에 저장하지 못했습니다.<br>
            <span id="savingErrorDetail"></span>
        </div>
    </div>

    <div class="ranking-card">
        <h2 class="ranking-title">🏆 스피드런 랭킹</h2>
        <div id="rankingContent" class="ranking-loading">불러오는 중...</div>
    </div>

    <script src="../../js/inq-api.js"></script>
    <script>
        function fmtTime(ms) {
            var min  = Math.floor(ms / 60000);
            var sec  = Math.floor((ms % 60000) / 1000);
            var msec = ms % 1000;
            return String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0') + '.' + String(msec).padStart(3,'0');
        }

        function showOldKept(name, oldMs, newMs) {
            document.getElementById('resultIcon').textContent = '⌛';
            document.getElementById('resultTitle').textContent = '이전 기록이 더 빠릅니다!';
            document.getElementById('resultName').textContent = name + '님의 기록';
            document.getElementById('resultTimeLabel').textContent = '현재 기록';
            document.getElementById('resultTime').textContent = fmtTime(newMs);
            document.getElementById('resultSub').textContent = '이전 기록이 유지됩니다.';

            var box = document.getElementById('compareBox');
            box.style.display = 'block';
            document.getElementById('compareLabel1').textContent = '✅ 유지된 기록';
            document.getElementById('compareTime1').className = 'compare-time better';
            document.getElementById('compareTime1').textContent = fmtTime(oldMs);
            document.getElementById('compareLabel2').textContent = '❌ 현재 기록';
            document.getElementById('compareTime2').className = 'compare-time worse';
            document.getElementById('compareTime2').textContent = fmtTime(newMs);
        }

        function showNewKept(name, newMs, oldMs) {
            document.getElementById('resultIcon').textContent = '🎉';
            document.getElementById('resultTitle').textContent = oldMs != null ? '기록 갱신!' : '티켓팅 완료!';
            document.getElementById('resultName').textContent = name + '님의 기록';
            document.getElementById('resultTimeLabel').textContent = oldMs != null ? '새 기록' : '기록';
            document.getElementById('resultTime').textContent = fmtTime(newMs);
            document.getElementById('resultSub').textContent = oldMs != null
                ? '새 기록이 저장되었습니다!\n빠른 티켓팅 실력이네요!'
                : '주문이 정상적으로 처리되었습니다.\n빠른 티켓팅 실력이네요!';

            if (oldMs != null) {
                var box = document.getElementById('compareBox');
                box.style.display = 'block';
                document.getElementById('compareLabel1').textContent = '✅ 새 기록';
                document.getElementById('compareTime1').className = 'compare-time better';
                document.getElementById('compareTime1').textContent = fmtTime(newMs);
                document.getElementById('compareLabel2').textContent = '🗑 이전 기록';
                document.getElementById('compareTime2').className = 'compare-time worse';
                document.getElementById('compareTime2').textContent = fmtTime(oldMs);
            }
        }

        function renderLeaderboard(leaderboard, myStopwatch) {
            var container = document.getElementById('rankingContent');
            if (!leaderboard || leaderboard.length === 0) {
                container.innerHTML = '<div class="ranking-empty">아직 기록이 없습니다.</div>';
                return;
            }
            var rows = leaderboard.map(function(r) {
                var isMe = myStopwatch > 0 && r.stopwatch === myStopwatch;
                var rankDisplay = r.rank + '등';
                var rankClass = 'rank-' + r.rank;
                return '<tr class="' + rankClass + (isMe ? ' my-record' : '') + '">'
                    + '<td class="td-rank">' + rankDisplay + '</td>'
                    + '<td class="td-name">' + r.name + (isMe ? ' 👈' : '') + '</td>'
                    + '<td>' + fmtTime(r.stopwatch) + '</td>'
                    + '</tr>';
            }).join('');

            container.innerHTML = '<table class="ranking-table">'
                + '<thead><tr><th>순위</th><th style="text-align:left;padding-left:12px">닉네임</th><th>기록</th></tr></thead>'
                + '<tbody>' + rows + '</tbody>'
                + '</table>';
        }

        async function loadLeaderboard(myStopwatch) {
            try {
                var data = await getTicketingLeaderboard();
                renderLeaderboard(data.leaderboard || [], myStopwatch);
            } catch (e) {
                document.getElementById('rankingContent').innerHTML = '<div class="ranking-empty">랭킹을 불러오지 못했습니다.</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', async function () {
            try {
                var sess = JSON.parse(sessionStorage.getItem('ticketingPracticeSession') || '{}');
                var name = sess.name || '익명';
                var stopwatch = sess.stopwatch || 0;
                var id = sess.id;

                // 일단 현재 기록 기본 표시
                document.getElementById('resultName').textContent = name + '님의 기록';
                document.getElementById('resultTime').textContent = fmtTime(stopwatch);

                if (id) {
                    try {
                        var result = await updateTicketingPracticeResult(id, stopwatch);
                        if (result && result.error) {
                            document.getElementById('savingMsg').style.display = 'none';
                            document.getElementById('savingErrorDetail').textContent = result.error;
                            document.getElementById('savingError').style.display = 'block';
                        } else if (result.kept === 'old') {
                            showOldKept(name, result.oldStopwatch, result.newStopwatch);
                            document.getElementById('savingMsg').textContent = '이전 기록이 유지되었습니다.';
                            stopwatch = result.oldStopwatch;
                        } else {
                            showNewKept(name, result.stopwatch, result.oldStopwatch);
                            document.getElementById('savingMsg').textContent = result.message || '기록이 저장되었습니다.';
                        }
                    } catch (dbErr) {
                        document.getElementById('savingMsg').style.display = 'none';
                        document.getElementById('savingErrorDetail').textContent = '서버에 연결할 수 없습니다.';
                        document.getElementById('savingError').style.display = 'block';
                    }
                } else {
                    document.getElementById('savingMsg').textContent = '';
                }

                loadLeaderboard(stopwatch);
            } catch (e) {
                console.error(e);
                document.getElementById('savingMsg').style.display = 'none';
                document.getElementById('savingError').style.display = 'block';
                document.getElementById('savingErrorDetail').textContent = e.message || '알 수 없는 오류';
            }
        });
    </script>
</body>
</html>
