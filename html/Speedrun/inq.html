<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓팅 연습 상품</title>
    <link rel="stylesheet" href="../../css/inq.css">
    <link rel="stylesheet" href="../../Common/Common.css">
</head>
<body>
    <div id="clsa">
        <section class="top-head">
            <div class="top-head__logo">
                <div class="logo-mark">🍒</div>
                <div>
                    <strong>티켓팅 연습 사이트</strong>
                </div>
            </div>
            <div class="top-head__content">
                <p>본 사이트는 티켓팅 연습 공간으로 실제 티켓팅 환경과는 차이가 있을 수 있습니다. <br>
                아울러 체리 숲 규칙에 따라 운영상 예고 없이 접속이 제한될 수 있으니 이용에 참고해 주시기 바랍니다.</p>
            </div>
        </section>
        <section class="page-title">
            <div>
                <h1>현준</h1>
                <p>ALL / Album / Season / Daily</p>
            </div>
        </section>
        <section class="goods-grid">
            <article class="goods-card" onclick="viewTicketingPractice()">
                <div class="goods-card__image">
                    <div class="goods-image-placeholder">이미지</div>
                    <div class="goods-overlay">
                        <div class="goods-overlay-icon">+</div>
                    </div>
                </div>
                <div class="goods-card__meta">
                    <div class="goods-badges">
                        <span class="badge new">NEW</span>
                        <span class="badge best">BEST</span>
                    </div>
                    <h2>티켓팅 연습</h2>
                    <div class="goods-price">
                        <span class="price">10,000원</span>
                        <span class="price-old">15,000원</span>
                    </div>
                </div>
            </article>
        </section>
    </div>
    <div id="Shor"></div>
    <div id="link"></div>
    <div id="footer"></div>
    <script src="../../js/inq.js"></script>
    <script src="../../loadHeaderFooter.js"></script>
    <script src="../../Common/Common.js"></script>
</body>
</html>
