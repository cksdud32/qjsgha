<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓팅 연습 사이트</title>
    <link rel="stylesheet" href="../../../css/inq-main2.css">
</head>
<body>

<section class="top-head">
    <div class="top-head__logo">
        <div class="logo-mark">🍒</div>
        <div><strong>티켓팅 연습 사이트</strong></div>
    </div>
    <div class="top-head__content">
        <h1>티켓팅 연습 사이트</h1>
        <p>본 사이트는 티켓팅 연습 공간으로 실제 티켓팅 환경과는 차이가 있을 수 있습니다. <br>
        아울러 체리 숲 규칙에 따라 운영상 예고 없이 접속이 제한될 수 있으니 이용에 참고해 주시기 바랍니다.</p>
    </div>
</section>

<main class="main-wrap">
    <p class="breadcrumb">HOME &gt; <span class="bc-pink">티켓팅</span> &gt; <strong>연습</strong></p>

    <div class="product-detail">
        <!-- 이미지 -->
        <div class="detail-img-col">
            <div class="detail-img-main">
                <img id="detailImg" src="../../../image/inqa.jpg" alt="티켓팅 연습" style="width:100%; height:100%; object-fit:cover; object-position:center 20%; display:block;">
            </div>
            <div class="detail-thumbs">
                <div class="thumb-box">
                    <img id="thumbImg" src="../../../image/inqa.jpg" alt="티켓팅 연습" style="width:100%; height:100%; object-fit:cover; object-position:center 15%; display:block;">
                </div>
            </div>
        </div>

        <!-- 정보 (PC) -->
        <div class="detail-info-col">
            <h1 class="detail-name" id="productName">티켓팅 연습</h1>
            <div class="detail-price-row">
                <div class="price-left">
                    <del class="price-old">65,000원</del>
                    <span class="price-now" id="priceNow">81,400원</span>
                </div>
                <div class="detail-badges">
                    <span class="badge badge-new">NEW</span>
                    <span class="badge badge-best">BEST</span>
                </div>
            </div>
            <hr class="sep">
            <div class="option-row">
                <span class="option-label" id="optionLabel">티켓팅 연습</span>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty(-1)">−</button>
                    <input type="text" class="qty-inp" id="qtyVal" value="1" readonly>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <span class="option-total" id="optionTotal">81,400원</span>
            </div>
            <hr class="sep">
            <div class="total-row">
                Total : <strong class="total-price" id="totalPrice">10,000</strong> <span class="total-won">원</span>
            </div>
            <div class="btn-row">
                <button class="btn-buy" onclick="buyNow()">BUY NOW</button>
                <button class="btn-cart" disabled>ADD TO CART</button>
                <button class="btn-wish" disabled>WISH LIST</button>
            </div>
        </div>
    </div>
</main>

<!-- 스톱워치 HUD -->
<div id="stopwatchHud" class="stopwatch-hud hidden">
    ⏱ <span id="swTime">00:00.000</span>
</div>

<!-- 모바일 하단 고정 바 -->
<div class="mobile-sticky" id="mobileSticky">
    <div class="ms-row">
        <span class="ms-name" id="msName">티켓팅 연습</span>
        <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input type="text" class="qty-inp" id="msQty" value="1" readonly>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <span class="ms-price" id="msPrice">81,400원</span>
        <button class="ms-toggle" id="msToggle" onclick="toggleMobileSticky()">∧</button>
    </div>
    <div class="ms-expanded" id="msExpanded" style="display:none">
        <div class="ms-total">Total : <strong id="msTotalPrice">10,000</strong> 원</div>
        <div class="ms-btn-row">
            <button class="btn-buy" onclick="buyNow()">BUY NOW</button>
            <button class="btn-cart" disabled>ADD TO CART</button>
            <button class="btn-wish" disabled>WISH LIST</button>
        </div>
    </div>
    <div class="ms-buynow-only" id="msBuynowOnly">
        <button class="btn-buy btn-buy--full" onclick="toggleMobileSticky()">BUY NOW</button>
    </div>
</div>

<script src="../../../js/inq-main2.js"></script>
</body>
</html>
