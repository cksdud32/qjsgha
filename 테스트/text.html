<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>응원 메시지 남기기</title>
  <style>
    /* 간단한 스타일 추가 */
    #guestbook { display: flex; flex-direction: column; gap: 10px; max-width: 300px; }
    textarea { height: 100px; }
  </style>
</head>
<body>
  <div id="guestbook">
    <h3>현준님께 응원 한마디!</h3>
    <input type="text" id="userName" placeholder="닉네임">
    <textarea id="userContent" placeholder="응원 메시지를 남겨주세요"></textarea>
    <button onclick="sendMessage()">보내기</button>
  </div>

  <script>
    async function sendMessage() {
      const name = document.getElementById('userName').value;
      const content = document.getElementById('userContent').value;

      if (!name || !content) {
        alert("닉네임과 내용을 모두 입력해주세요! 🍒");
        return;
      }

      try {
        // 주소에서 .js를 빼고 '/api/파일명' 형식으로 호출합니다.
        const response = await fetch('/api/post-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, content })
        });

        if (response.ok) {
          alert("메시지가 소중하게 전달되었습니다! 🍒");
          document.getElementById('userName').value = '';
          document.getElementById('userContent').value = '';
        } else {
          const errorData = await response.json();
          alert("전송 실패: " + (errorData.error || "알 수 없는 에러"));
        }
      } catch (e) {
        console.error(e);
        alert("서버와 통신 중 오류가 발생했습니다.");
      }
    }
  </script>
</body>
</html>
