<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <div id="guestbook">
  <h3>현준님께 응원 한마디!</h3>
  <input type="text" id="userName" placeholder="닉네임">
  <textarea id="userContent" placeholder="응원 메시지를 남겨주세요"></textarea>
  <button onclick="sendMessage()">보내기</button>
</div>

<script>
async function sendMessage() {
  const name = document.getElementById('userName').value;
  const content = document.getElementById('userContent').value;

  const response = await fetch('/api/post-message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, content })
  });

  if (response.ok) {
    alert("메시지가 소중하게 전달되었습니다! 🍒");
  }
}
</script>
</body>
<script src="../api/post-message.js"></script>
</html>
